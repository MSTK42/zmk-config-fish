# Enable status advertisement
CONFIG_ZMK_STATUS_ADVERTISEMENT=y
CONFIG_ZMK_STATUS_ADV_KEYBOARD_NAME="FISH"

# Split keyboard only: enable peripheral battery fetching
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_STATUS_ADV_CENTRAL_SIDE="LEFT"

# ================================
# Bluetooth / BLE 安定化
# ================================

# 2M PHY を使わない（安定性・省電力優先）
CONFIG_BT_CTLR_PHY_2M=n

# Experimental BLE connection handling（不安定なら有効）
# CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y


# ================================
# ZMK stack sizes（安定動作用）
# ================================

# CONFIG_ZMK_BLE_THREAD_STACK_SIZE=3072
# CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=2048
# CONFIG_INPUT_THREAD_STACK_SIZE=2048
# CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=3072
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=4096
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y


# ================================
# スリープ設定（電池運用）
# ================================

# CONFIG_ZMK_SLEEP=y
# 15分（ミリ秒）
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000


# ================================
# ポインティング
# ================================

CONFIG_ZMK_POINTING=n
